services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    container_name: ${STORE_NAME:-cabox}_app
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./app/src:/app/src
      - ./app/prisma:/app/prisma
      - ./app/public:/app/public
      - ./app/tsconfig.json:/app/tsconfig.json
      - ./app/next.config.mjs:/app/next.config.mjs
      - ./app/postcss.config.mjs:/app/postcss.config.mjs
    env_file:
      - ./.env.dev
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_URL_DIRECT=${DATABASE_URL_DIRECT}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD}
      - NEXT_PUBLIC_STORE_NAME=${NEXT_PUBLIC_STORE_NAME}
      - NEXT_PUBLIC_STORE_TAGLINE=${NEXT_PUBLIC_STORE_TAGLINE}
      - NEXT_PUBLIC_SUPPORT_WHATSAPP=${NEXT_PUBLIC_SUPPORT_WHATSAPP}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_DEFAULT_LOCALE=${NEXT_PUBLIC_DEFAULT_LOCALE}
      - NEXT_PUBLIC_CURRENCY=${NEXT_PUBLIC_CURRENCY}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      - NEXT_PUBLIC_PAYPAL_CLIENT_ID=${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
      - NEXT_PUBLIC_META_PIXEL_ID=${NEXT_PUBLIC_META_PIXEL_ID}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - PAYPAL_CLIENT_SECRET=${PAYPAL_CLIENT_SECRET}
      - PAYPAL_MODE=${PAYPAL_MODE}
      - GOOGLE_CLOUD_VISION_API_KEY=${GOOGLE_CLOUD_VISION_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CSE_API_KEY=${GOOGLE_CSE_API_KEY}
      - GOOGLE_CSE_SEARCH_ENGINE_ID=${GOOGLE_CSE_SEARCH_ENGINE_ID}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_ACCESS_TOKEN=${WHATSAPP_ACCESS_TOKEN}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - WHATSAPP_BUSINESS_ACCOUNT_ID=${WHATSAPP_BUSINESS_ACCOUNT_ID}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - META_CAPI_ACCESS_TOKEN=${META_CAPI_ACCESS_TOKEN}
      - META_CAPI_PIXEL_ID=${META_CAPI_PIXEL_ID}
      - SENTRY_DSN=${SENTRY_DSN}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
      - SINPE_PHONE_NUMBER=${SINPE_PHONE_NUMBER}
      - SINPE_ACCOUNT_NAME=${SINPE_ACCOUNT_NAME}
      - BANK_NAME=${BANK_NAME}
      - BANK_IBAN=${BANK_IBAN}
      - BANK_ACCOUNT_NAME=${BANK_ACCOUNT_NAME}

    depends_on:
      - pgbouncer
      - redis
    networks:
      - cabox_net
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ${STORE_NAME:-cabox}_nginx
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - app
    networks:
      - cabox_net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: ${STORE_NAME:-cabox}_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cabox_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cabox_pass}
      POSTGRES_DB: ${POSTGRES_DB:-cabox_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - cabox_pgdata:/var/lib/postgresql/data
    networks:
      - cabox_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cabox_user} -d ${POSTGRES_DB:-cabox_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: ${STORE_NAME:-cabox}_pgbouncer
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-cabox_user}:${POSTGRES_PASSWORD:-cabox_pass}@db:5432/${POSTGRES_DB:-cabox_dev}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      SERVER_RESET_QUERY: DISCARD ALL
    ports:
      - "${PGBOUNCER_PORT:-6432}:5432"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cabox_net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${STORE_NAME:-cabox}_redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - cabox_redis:/data
    networks:
      - cabox_net
    restart: unless-stopped

# Static volume/network names — Compose v2 does not allow variable interpolation
# in top-level keys. For multi-store isolation use spawn_store.sh which generates
# a fully self-contained compose file per store with a unique COMPOSE_PROJECT_NAME.
volumes:
  cabox_pgdata:
  cabox_redis:

networks:
  cabox_net:
    driver: bridge
