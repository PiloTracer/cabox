version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       cabox_prd
      POSTGRES_USER:     cabox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prd_data:/var/lib/postgresql/data
    networks: [cabox-prd]
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U cabox -d cabox_prd"]
      interval: 10s
      timeout:  5s
      retries:  5

  app:
    build:
      context: ./app
      dockerfile: ../Dockerfile.prd
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:        postgresql://cabox:${POSTGRES_PASSWORD}@postgres:5432/cabox_prd
      DATABASE_URL_DIRECT: postgresql://cabox:${POSTGRES_PASSWORD}@postgres:5432/cabox_prd
      NEXTAUTH_URL:        ${NEXTAUTH_URL}
      NEXTAUTH_SECRET:     ${NEXTAUTH_SECRET}
      ADMIN_EMAIL:         ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      STRIPE_SECRET_KEY:   ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN:    ${WHATSAPP_ACCESS_TOKEN}
    networks: [cabox-prd]
    expose: ["3000"]

  nginx:
    image: nginx:1.25-alpine
    restart: always
    depends_on: [app]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.prd.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks: [cabox-prd]

volumes:
  postgres_prd_data:

networks:
  cabox-prd:
    driver: bridge
