services:
  postgres:
    image: postgres:16-alpine
    container_name: cabox_prd_db
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - cabox_prd_pgdata:/var/lib/postgresql/data
    networks: [cabox-prd]
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: cabox_prd_pgbouncer
    restart: always
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 25
      SERVER_RESET_QUERY: DISCARD ALL
    depends_on:
      postgres:
        condition: service_healthy
    networks: [cabox-prd]

  redis:
    image: redis:7-alpine
    container_name: cabox_prd_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - cabox_prd_redis:/data
    networks: [cabox-prd]
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5

  app:
    build:
      context: ./app
      dockerfile: ../Dockerfile.prd
    container_name: cabox_prd_app
    restart: always
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "6410:3000"    # Exposed to host nginx reverse proxy
    env_file:
      - ./.env.prd
    environment:
      NODE_ENV: production
      # ── Database ──
      DATABASE_URL:        ${DATABASE_URL}
      DATABASE_URL_DIRECT: ${DATABASE_URL_DIRECT}
      # ── Auth ──
      NEXTAUTH_URL:        ${NEXTAUTH_URL}
      NEXTAUTH_SECRET:     ${NEXTAUTH_SECRET}
      ADMIN_EMAIL:         ${ADMIN_EMAIL}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD}
      # ── Store Identity ──
      NEXT_PUBLIC_STORE_NAME:        ${NEXT_PUBLIC_STORE_NAME}
      NEXT_PUBLIC_STORE_TAGLINE:     ${NEXT_PUBLIC_STORE_TAGLINE}
      NEXT_PUBLIC_SUPPORT_WHATSAPP:  ${NEXT_PUBLIC_SUPPORT_WHATSAPP}
      NEXT_PUBLIC_APP_URL:           ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_DEFAULT_LOCALE:    ${NEXT_PUBLIC_DEFAULT_LOCALE}
      NEXT_PUBLIC_CURRENCY:          ${NEXT_PUBLIC_CURRENCY}
      # ── Stripe ──
      STRIPE_SECRET_KEY:                   ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET:               ${STRIPE_WEBHOOK_SECRET}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:  ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      # ── PayPal ──
      NEXT_PUBLIC_PAYPAL_CLIENT_ID:  ${NEXT_PUBLIC_PAYPAL_CLIENT_ID}
      PAYPAL_CLIENT_SECRET:          ${PAYPAL_CLIENT_SECRET}
      PAYPAL_MODE:                   ${PAYPAL_MODE}
      # ── Google APIs ──
      GEMINI_API_KEY:                ${GEMINI_API_KEY}
      GOOGLE_CLOUD_VISION_API_KEY:   ${GOOGLE_CLOUD_VISION_API_KEY}
      GOOGLE_CSE_API_KEY:            ${GOOGLE_CSE_API_KEY}
      GOOGLE_CSE_SEARCH_ENGINE_ID:   ${GOOGLE_CSE_SEARCH_ENGINE_ID}
      # ── Perplexity ──
      PERPLEXITY_API_KEY:            ${PERPLEXITY_API_KEY}
      # ── WhatsApp ──
      WHATSAPP_PHONE_NUMBER_ID:      ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_ACCESS_TOKEN:         ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN:         ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_BUSINESS_ACCOUNT_ID:  ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      # ── Supabase ──
      SUPABASE_URL:              ${SUPABASE_URL}
      SUPABASE_ANON_KEY:         ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      # ── Meta / Social ──
      NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID}
      META_CAPI_ACCESS_TOKEN:    ${META_CAPI_ACCESS_TOKEN}
      META_CAPI_PIXEL_ID:        ${META_CAPI_PIXEL_ID}
      # ── Payments (Manual) ──
      SINPE_PHONE_NUMBER:   ${SINPE_PHONE_NUMBER}
      SINPE_ACCOUNT_NAME:   ${SINPE_ACCOUNT_NAME}
      BANK_NAME:            ${BANK_NAME}
      BANK_IBAN:            ${BANK_IBAN}
      BANK_ACCOUNT_NAME:    ${BANK_ACCOUNT_NAME}
      # ── Error Monitoring ──
      SENTRY_DSN:             ${SENTRY_DSN}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      # ── Email ──
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
      EMAIL_FROM:       ${EMAIL_FROM}
      # ── Rate Limiting ──
      UPSTASH_REDIS_REST_URL:   ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
    networks: [cabox-prd]

volumes:
  cabox_prd_pgdata:
  cabox_prd_redis:

networks:
  cabox-prd:
    driver: bridge
